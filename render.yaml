services:
  - type: web
    name: alphaflow
    runtime: python
    region: oregon
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: NODE_VERSION
        value: "20.18.0"
