# render.yaml — Render Blueprint for AlphaFlow
# Deploy: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: alphaflow
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: NODE_VERSION
        value: "20.18.0"
    healthCheckPath: /health
